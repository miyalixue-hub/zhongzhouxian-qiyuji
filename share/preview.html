<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 魔法师训练营 · 中轴奇游记</title>

  <!-- 微信分享卡片 Open Graph -->
  <meta property="og:title" content="快来看看我创造的 3D 神兽！">
  <meta property="og:description" content="AI 魔法师训练营 · 中轴奇游记 — 每个孩子都是小小造物师">
  <meta property="og:image" content="share-cover.png">
  <meta property="og:url" content="">
  <meta name="description" content="AI 魔法师训练营 · 中轴奇游记 — 看看我用 AI 创造的 3D 守护神兽">

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/STLLoader.js"></script>

  <style>/* ===== Reset & Base ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #4FC3F7;
  --accent: #FF9800;
  --bg: #E3F2FD;
  --card-bg: #ffffff;
  --text: #263238;
  --text-light: #607D8B;
  --radius: 20px;
  --shadow: 0 4px 20px rgba(79, 195, 247, 0.15);
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
  overflow-x: hidden;
  /* 背景装饰 */
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 5%, rgba(79, 195, 247, 0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 90% 95%, rgba(255, 152, 0, 0.12) 0%, transparent 70%);
}

/* ===== 顶部信息区 ===== */
.top-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 24px 20px 12px;
}

.avatar-ring {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(79, 195, 247, 0.3);
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}

.title-group h1 {
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
}

.subtitle {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 2px;
}

/* ===== 通用卡片 ===== */
.card {
  margin: 14px 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.card-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--primary);
  padding: 14px 18px 0;
  letter-spacing: 0.5px;
}

/* ===== 2D 图片区 ===== */
.image-wrapper {
  padding: 12px 18px 6px;
}

.image-wrapper img {
  width: 100%;
  border-radius: 14px;
  display: block;
  background: var(--bg);
  aspect-ratio: 4 / 3;
  object-fit: cover;
}

.image-caption {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-light);
  padding: 4px 0 16px;
}

/* ===== 3D 模型区 ===== */
.model-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  max-height: 70vw;
  margin: 10px 0 0;
  cursor: grab;
}

.model-wrapper:active {
  cursor: grabbing;
}

#model_canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 0 0 var(--radius) var(--radius);
}

/* 加载遮罩 */
.model-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: rgba(227, 242, 253, 0.85);
  backdrop-filter: blur(6px);
  border-radius: 0 0 var(--radius) var(--radius);
  font-size: 0.85rem;
  color: var(--text-light);
  transition: opacity 0.4s ease;
  z-index: 2;
}

.model-loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3.5px solid rgba(79, 195, 247, 0.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== 底部操作区 ===== */
.bottom-bar {
  padding: 20px 20px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.download-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-download {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #B0BEC5, #90A4AE);
  color: #fff;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn-download.active {
  background: linear-gradient(135deg, var(--primary), #29B6F6);
  box-shadow: 0 4px 18px rgba(79, 195, 247, 0.4);
}

.btn-download:active {
  transform: scale(0.96);
  box-shadow: 0 2px 10px rgba(79, 195, 247, 0.3);
}

.btn-download[disabled] {
  opacity: 0.5;
  pointer-events: none;
}

.format-hint {
  font-size: 0.75rem;
  color: var(--text-light);
  margin: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text-light);
  letter-spacing: 0.3px;
}

.brand-icon {
  font-size: 1rem;
}

/* ===== 占位图 SVG 背景 ===== */
.placeholder-img {
  background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 50%, #E3F2FD 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== 小屏适配 ===== */
@media (max-width: 360px) {
  .card { margin: 10px 12px; }
  .top-bar { padding: 18px 14px 10px; }
  .title-group h1 { font-size: 1.1rem; }
}

/* ===== 横屏 / 大屏限制宽度 ===== */
@media (min-width: 520px) {
  body {
    max-width: 420px;
    margin: 0 auto;
  }
}
</style>
</head>
<body>
  <div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#FF9800;color:#fff;text-align:center;padding:6px 0;font-size:0.8rem;font-weight:600;">
    🔔 预览模式（演示数据） · 正式效果需部署后端
  </div>
  <div style="height:28px;"></div>


  <!-- ========== 顶部信息区 ========== -->
  <header class="top-bar">
    <div class="avatar-ring">
      <div class="avatar" id="avatar">小</div>
    </div>
    <div class="title-group">
      <h1 id="work-title">我的守护神兽</h1>
      <p class="subtitle" id="work_subtitle">这是小明创造的守护神兽</p>
    </div>
  </header>

  <!-- ========== 2D 作品图片 ========== -->
  <section class="card image-card">
    <div class="card-label">✏️ 手绘原稿</div>
    <div class="image-wrapper">
      <img id="artwork_2d" src="" alt="作品 2D 图片">
    </div>
    <p class="image-caption" id="image_caption">用画笔赋予神兽灵魂</p>
  </section>

  <!-- ========== 3D 模型预览 ========== -->
  <section class="card model-card">
    <div class="card-label">🐉 3D 神兽 · 可拖拽旋转</div>
    <div class="model-wrapper" id="model_wrapper">
      <canvas id="model_canvas"></canvas>
      <!-- 加载遮罩 -->
      <div class="model-loading" id="model_loading">
        <div class="spinner"></div>
        <span>神兽加载中…</span>
      </div>
    </div>
  </section>

  <!-- ========== 底部操作区 ========== -->
  <footer class="bottom-bar">
    <div class="download-group">
      <button class="btn-download active" id="btn_download_stl" data-format="stl">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 STL
      </button>
      <button class="btn-download" id="btn_download_3mf" data-format="3mf">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 3MF
      </button>
    </div>
    <p class="format-hint">💡 拓竹用户推荐 3MF 格式</p>
    <div class="brand">
      <span class="brand-icon">🪄</span>
      AI 魔法师训练营 · 中轴奇游记
    </div>
  </footer>

  <script>/**
 * AI 魔法师训练营 · 中轴奇游记 — 分享页
 *
 * 功能：
 *  1. 从 URL 参数 ?id=xxx 获取作品 ID
 *  2. 调用后端 API 获取作品数据（当前用占位数据演示）
 *  3. 渲染 2D 图片
 *  4. Three.js 加载并展示 STL 3D 模型（自动旋转 + 手势拖拽）
 *  5. 下载 STL 文件
 */

(function () {
  'use strict';

  // ======================== 配置 ========================
  // TODO: 对接后端后替换为真实 API 地址
  const API_BASE = '';  // 例如 'https://api.example.com'
  const API_WORK_DETAIL = API_BASE + '/api/work/detail';       // GET ?id=xxx
  const API_STL_DOWNLOAD = API_BASE + '/api/work/stl';         // GET ?id=xxx → 返回文件流

  // ======================== 占位图 Data URI ========================
  const PLACEHOLDER_2D = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">' +
    '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
    '<stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/>' +
    '</linearGradient></defs>' +
    '<rect width="800" height="600" fill="url(#g)"/>' +
    '<text x="400" y="280" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#4FC3F7">🐉</text>' +
    '<text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#90A4AE">手绘作品图片</text>' +
    '</svg>'
  );

  // 占位 STL —— 一个简单立方体，Three.js STL 二进制格式
  // 如果后端无 STL 文件，用此占位模型演示 3D 旋转效果
  function createPlaceholderSTL() {
    // 创建一个简单几何体作为占位 3D 模型
    const geometry = new THREE.IcosahedronGeometry(1.2, 1);
    return geometry;
  }

  // ======================== 工具函数 ========================

  /** 获取 URL 参数 */
  function getUrlParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  /** 模拟 API 请求（对接后端时替换） */
  async function fetchWorkData(id) {
    // ====== 对接真实 API 时，取消以下注释并删除模拟数据 ======
    // const res = await fetch(`${API_WORK_DETAIL}?id=${encodeURIComponent(id)}`);
    // if (!res.ok) throw new Error('获取作品数据失败');
    // return await res.json();

    // 模拟数据（演示用）
    return {
      id: id || 'demo001',
      title: '龙角守护兽',
      subtitle: '这是小明创造的守护神兽',
      studentName: '小明',
      avatarLetter: '明',
      artworkImage: '',        // 2D 图片 URL，空则用占位图
      stlUrl: '',              // STL 文件 URL，空则用占位模型
      createdAt: '2025-01-15'
    };
  }

  // ======================== DOM 渲染 ========================

  function renderWork(data) {
    // 标题 & 副标题
    document.getElementById('work_title').textContent = data.title;
    document.getElementById('work_subtitle').textContent = data.subtitle;

    // 头像
    const avatar = document.getElementById('avatar');
    avatar.textContent = data.avatarLetter || (data.studentName ? data.studentName[0] : '我');

    // 2D 图片
    const img = document.getElementById('artwork_2d');
    img.src = data.artworkImage || PLACEHOLDER_2D;

    // 图片说明
    document.getElementById('image_caption').textContent =
      data.studentName ? `${data.studentName} 用画笔赋予神兽灵魂` : '用画笔赋予神兽灵魂';

    // 页面 title
    document.title = `${data.title} — AI 魔法师训练营`;

    // 微信分享 meta
    updateOGMeta(data);
  }

  function updateOGMeta(data) {
    const setMeta = (attr, val) => {
      let el = document.querySelector(`meta[property="${attr}"]`);
      if (el) el.setAttribute('content', val);
    };
    setMeta('og:title', `快来看看${data.studentName || '我'}创造的神兽：${data.title}！`);
    setMeta('og:description', data.subtitle);
    if (data.artworkImage) {
      setMeta('og:image', data.artworkImage);
    }
    setMeta('og:url', window.location.href);
  }

  // ======================== Three.js 3D 渲染 ========================

  let scene, camera, renderer, controls, modelMesh;
  const canvasEl = document.getElementById('model_canvas');
  const wrapperEl = document.getElementById('model_wrapper');
  const loadingEl = document.getElementById('model_loading');

  function initThree() {
    const width = wrapperEl.clientWidth;
    const height = wrapperEl.clientHeight;

    // 场景
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xE3F2FD);

    // 相机
    camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
    camera.position.set(0, 1.5, 4);

    // 渲染器
    renderer = new THREE.WebGLRenderer({
      canvas: canvasEl,
      antialias: true,
      alpha: false
    });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // 灯光
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x4FC3F7, 0.3);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);

    // 轨道控制器（手势旋转）
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 3.0;
    controls.enablePan = false;
    controls.minDistance = 2;
    controls.maxDistance = 8;
    controls.maxPolarAngle = Math.PI * 0.85;

    // 地面网格（装饰）
    const gridHelper = new THREE.GridHelper(6, 12, 0xBBDEFB, 0xE1F5FE);
    gridHelper.position.y = -1.5;
    scene.add(gridHelper);

    // 响应窗口变化
    window.addEventListener('resize', onResize);

    // 开始渲染循环
    animate();
  }

  function onResize() {
    const width = wrapperEl.clientWidth;
    const height = wrapperEl.clientHeight;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  // ---------- 加载 3D 模型 ----------

  async function loadModel(data) {
    try {
      if (data.stlUrl) {
        // 从 URL 加载 STL 文件
        await loadSTLFromUrl(data.stlUrl);
      } else {
        // 使用占位模型
        loadPlaceholderModel();
      }
    } catch (err) {
      console.error('模型加载失败，使用占位模型:', err);
      loadPlaceholderModel();
    }
    hideLoading();
  }

  function loadPlaceholderModel() {
    const geometry = createPlaceholderSTL();
    const material = new THREE.MeshPhongMaterial({
      color: 0x4FC3F7,
      specular: 0x29B6F6,
      shininess: 60,
      flatShading: true
    });
    modelMesh = new THREE.Mesh(geometry, material);
    modelMesh.position.y = 0;
    scene.add(modelMesh);

    // 给占位模型一个可爱的上下浮动动画
    const baseY = 0;
    function floatAnim() {
      requestAnimationFrame(floatAnim);
      if (modelMesh) {
        modelMesh.position.y = baseY + Math.sin(Date.now() * 0.002) * 0.1;
      }
    }
    floatAnim();
  }

  async function loadSTLFromUrl(url) {
    return new Promise((resolve, reject) => {
      const loader = new THREE.STLLoader();
      loader.load(
        url,
        (geometry) => {
          // 自动居中和缩放
          geometry.computeBoundingBox();
          const box = geometry.boundingBox;
          const center = new THREE.Vector3();
          box.getCenter(center);
          geometry.translate(-center.x, -center.y, -center.z);

          const size = new THREE.Vector3();
          box.getSize(size);
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 2.5 / maxDim;
          geometry.scale(scale, scale, scale);

          const material = new THREE.MeshPhongMaterial({
            color: 0x4FC3F7,
            specular: 0x29B6F6,
            shininess: 80,
            flatShading: false
          });
          modelMesh = new THREE.Mesh(geometry, material);
          scene.add(modelMesh);
          resolve();
        },
        undefined,
        (err) => reject(err)
      );
    });
  }

  function hideLoading() {
    loadingEl.classList.add('hidden');
  }

  // ======================== 下载 STL / 3MF ========================

  const btnDownloadSTL = document.getElementById('btn_download_stl');
  const btnDownload3MF = document.getElementById('btn_download_3mf');

  function handleDownload(format) {
    const workId = getUrlParam('id') || 'demo';

    // ====== 对接真实 API 时，取消以下注释 ======
    // const btn = format === '3mf' ? btnDownload3MF : btnDownloadSTL;
    // try {
    //   btn.disabled = true;
    //   const origText = btn.textContent;
    //   btn.textContent = '下载中…';
    //   const res = await fetch(`${API_BASE}/api/work/download?id=${encodeURIComponent(workId)}&format=${format}`);
    //   const blob = await res.blob();
    //   const a = document.createElement('a');
    //   a.href = URL.createObjectURL(blob);
    //   a.download = `神兽_${workId}.${format}`;
    //   a.click();
    //   URL.revokeObjectURL(a.href);
    // } catch (e) {
    //   alert('下载失败，请稍后再试');
    // } finally {
    //   btn.disabled = false;
    // }

    // 演示模式
    alert(`🐉 ${format.toUpperCase()} 文件将在对接后端后可下载\n\n作品 ID：${workId}\n格式：${format.toUpperCase()}`);
  }

  btnDownloadSTL.addEventListener('click', () => handleDownload('stl'));
  btnDownload3MF.addEventListener('click', () => handleDownload('3mf'));

  // ======================== 初始化 ========================

  async function init() {
    const workId = getUrlParam('id');

    try {
      // 获取作品数据
      const data = await fetchWorkData(workId);

      // 渲染页面内容
      renderWork(data);

      // 初始化 Three.js
      initThree();

      // 加载 3D 模型
      await loadModel(data);

    } catch (err) {
      console.error('初始化失败:', err);
      // 降级：仍然初始化场景
      initThree();
      loadPlaceholderModel();
      hideLoading();
    }
  }

  // 启动
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
