# Cloudflare Worker 配置
# 部署方式:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler secret put VOLCENGINE_API_KEY  (输入火山引擎 Ark API Key)
#   4. wrangler secret put MESHY_API_KEY  (输入 Meshy API Key)
#   5. wrangler deploy

name = "zhongzhouxian-api"
main = "meshy-proxy.js"
compatibility_date = "2024-09-01"

# Worker 路由（绑定到 api.mindbubble.cloud）
routes = [
  { pattern = "api.mindbubble.cloud/*", zone_name = "mindbubble.cloud" }
]

# 环境变量（Secrets 通过 wrangler secret put 设置）
# VOLCENGINE_API_KEY - 火山引擎 Ark API Key
# MESHY_API_KEY - Meshy API Key
